# Phase-0 locked toolchain (TASK P0.004).
#
# This file pins what the repo actually uses today and records — honestly, without fake pins — the
# training stack that is DEFERRED until it is really introduced (PA tasks / LAUNCH-A). A version is
# only listed here once code depends on it, so the lock never lies about what a run used.
#
# Provenance note: the authoritative, machine-captured environment for any given run lives in that
# run's provenance.json (see src/ezhuthu_jepa/provenance.py, capture_environment). This file is the
# human-facing intent; provenance.json is the ground truth per run.

config_schema_version: "0.1.0"   # ezhuthu_jepa.config.SCHEMA_VERSION — bump in lockstep.

runtime:
  python: ">=3.10"

# Pinned now (used by the G0/Phase-0 skeleton and the PA.001 rendering pipeline). Exact versions
# are the ground truth captured per data-gen run in the render manifest's environment block.
pinned:
  pytest: ">=7"
  numpy: "2.4.3"           # PA.001 array ops / seam diff
  pillow: "12.1.1"         # PA.001 raster save + resize (Pillow)
  uharfbuzz: "0.55.0"      # PA.001 complex-text shaping (reordering, ligatures)
  freetype-py: "2.13.2"    # PA.001 glyph-ID rasterization
  pyyaml: "6.0.3"          # PA.001 loads configs/phase1/render.yaml
  torch: "2.10.0+cu130"    # PA.005 I-JEPA ViT pretraining loop (RTX 5090, CUDA 13.0). dtype= only.

# Deferred: pinned to exact versions at the task that introduces each dependency. Listed so the
# roadmap is explicit and no one adds them ad hoc. NOT installed by the current pyproject.
deferred:
  # torchvision is present on the machine (0.25.0+cu130) but the PA.005 ViT is written from scratch on
  # torch.nn alone, so it is NOT a code dependency; it stays here until code actually imports it.
  - name: torchvision
    pin_at: "unused (from-scratch ViT); pin if a transform/dataset is adopted"
  - name: timm
    pin_at: "unused (from-scratch ViT/8, not timm); pin only if we swap to a timm backbone"
  - name: gradio
    pin_at: P3.002            # transcription-aid demo
